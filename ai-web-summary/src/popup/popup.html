<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header>
      <select id="model-select" title="选择已保存的模型"></select>
      <button id="settings-btn" title="设置">⚙️</button>
    </header>
    <button id="summarize-btn">总结此页</button>

    <section id="settings-panel" hidden>
      <h3>添加模型</h3>
      <label>预设服务商 / 模型
        <select id="preset-select"></select>
      </label>
      <input id="key-input" type="password" placeholder="粘贴该服务商的 API Key" />
      <button id="save-btn">保存</button>
      <p id="settings-msg" class="settings-msg"></p>
      <h3>已保存</h3>
      <ul id="saved-list"></ul>
    </section>

    <div id="notice" class="notice" hidden></div>
    <pre id="result" class="result"></pre>
    <button id="copy-btn" hidden>复制</button>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>

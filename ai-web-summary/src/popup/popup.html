<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">AI 网页总结</span>
        </div>
        <button id="settings-btn" class="icon-btn" title="设置" aria-label="设置">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </header>

      <div class="control">
        <div class="select-wrap">
          <select id="model-select" title="选择已保存的模型"></select>
        </div>
        <button id="summarize-btn" class="btn-primary">
          <span class="btn-label">总结此页</span>
        </button>
      </div>

      <section id="settings-panel" class="panel" hidden>
        <p class="panel-title">添加模型</p>
        <label class="field">
          <span class="field-label">预设服务商 / 模型</span>
          <div class="select-wrap">
            <select id="preset-select"></select>
          </div>
        </label>
        <input id="key-input" class="input" type="password" placeholder="粘贴该服务商的 API Key" />
        <button id="save-btn" class="btn-ghost">保存配置</button>
        <p id="settings-msg" class="settings-msg"></p>
        <p class="panel-title">已保存</p>
        <ul id="saved-list" class="saved-list"></ul>
      </section>

      <div id="notice" class="notice" hidden></div>
      <pre id="result" class="result"></pre>
      <button id="copy-btn" class="btn-copy" hidden>复制摘要</button>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
